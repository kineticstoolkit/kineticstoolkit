# .github/workflows/pages.yml
name: Deploy Docs

on:
  push:
    branches: [ "master", "release" ] # Your target branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    defaults:
      run:
        shell: bash -l {0}
    runs-on: ubuntu-latest
    steps:
#    - uses: actions/checkout@v4
    - name: Setup conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: anaconda-client-env
    - name: Install dependencies
      run: |
        conda install -c conda-forge python=${{ matrix.python-version }} mamba sphinx sphinx-book-theme myst-nb sphinx-sitemap sphinxext-opengraph -y
        # mamba install -c conda-forge kineticstoolkit --only-deps -y
        mamba install -c conda-forge kineticstoolkit -y
    - name: Build with Sphinx
      run: |
        rm ktk
        ln -s kineticstoolkit ktk
        export PYTHONPATH=$PYTHONPATH:.
        sphinx-build -b html docs/ docs/_build/html
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs/_build/html' # Directly publish the built folder
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
