# .github/workflows/pages.yml
name: Deploy Docs

on:
  push:
    branches: [ "master", "release" ] # Your target branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          ln -s kineticstoolkit ktk
          pip install sphinx sphinx-book-theme myst-nb sphinx-sitemap sphinxext-opengraph

      - name: Build with Sphinx
        run: |
          sphinx-build -b html docs/ docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_build/html' # Directly publish the built folder

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
